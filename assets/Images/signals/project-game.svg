<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120" role="img" aria-labelledby="game-title">
  <title id="game-title">Game recommendation system</title>

  <defs>
    <filter id="game-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Input game -->
  <rect x="16" y="43" width="46" height="30" rx="10" fill="rgba(52, 152, 219, 0.08)" stroke="#3498db" stroke-width="1.7" />
  <line x1="32" y1="53" x2="32" y2="64" stroke="#3498db" stroke-width="1.7" stroke-linecap="round" />
  <line x1="26.5" y1="58.5" x2="37.5" y2="58.5" stroke="#3498db" stroke-width="1.7" stroke-linecap="round" />
  <circle cx="49" cy="55" r="2.1" fill="#eeeae2" />
  <circle cx="53.5" cy="61" r="2.1" fill="#eeeae2" />

  <!-- Feature vector handoff -->
  <path d="M 62 58 C 70 58, 74 58, 81 58" fill="none" stroke="#3498db" stroke-width="1.2" stroke-dasharray="3 4" stroke-linecap="round" />
  <circle cx="72" cy="58" r="2.2" fill="#3498db" filter="url(#game-glow)" />

  <!-- Similarity engine -->
  <circle cx="96" cy="58" r="18" fill="rgba(52, 152, 219, 0.06)" stroke="#3498db" stroke-width="1.7" />
  <circle cx="96" cy="58" r="5.2" fill="none" stroke="#eeeae2" stroke-width="1.1" />
  <path d="M 96 40 L 96 76 M 78 58 L 114 58 M 83.5 45.5 L 108.5 70.5 M 108.5 45.5 L 83.5 70.5" fill="none" stroke="#3498db" stroke-width="0.75" stroke-linecap="round" opacity="0.42" />
  <circle cx="88" cy="50" r="1.8" fill="#eeeae2" />
  <circle cx="104" cy="48" r="1.8" fill="#eeeae2" />
  <circle cx="106.5" cy="66" r="1.8" fill="#3498db" />
  <circle cx="87.5" cy="68" r="1.8" fill="#3498db" />

  <!-- Ranked recommendations -->
  <path d="M 114 58 C 121 43, 124 36, 130 34" fill="none" stroke="#3498db" stroke-width="1.1" stroke-dasharray="3 4" stroke-linecap="round" />
  <path d="M 114 58 C 122 58, 124 58, 130 58" fill="none" stroke="#3498db" stroke-width="1.1" stroke-dasharray="3 4" stroke-linecap="round" />
  <path d="M 114 58 C 121 73, 124 80, 130 82" fill="none" stroke="#3498db" stroke-width="1.1" stroke-dasharray="3 4" stroke-linecap="round" />

  <g>
    <rect x="130" y="24" width="36" height="20" rx="4" fill="rgba(52, 152, 219, 0.12)" stroke="#3498db" stroke-width="1.7" />
    <circle cx="137" cy="34" r="3" fill="none" stroke="#eeeae2" stroke-width="1.2" />
    <path d="M 145 30 H 159 M 145 35 H 155" fill="none" stroke="#3498db" stroke-width="1.1" stroke-linecap="round" />
    <path d="M 158 40 L 160 36 L 162 40" fill="none" stroke="#eeeae2" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g opacity="0.82">
    <rect x="130" y="50" width="36" height="18" rx="4" fill="rgba(238, 234, 226, 0.02)" stroke="#3498db" stroke-width="1.5" />
    <circle cx="137" cy="59" r="2.5" fill="none" stroke="#eeeae2" stroke-width="1" />
    <path d="M 145 56 H 159 M 145 61 H 154" fill="none" stroke="#3498db" stroke-width="1" stroke-linecap="round" />
  </g>

  <g opacity="0.66">
    <rect x="130" y="76" width="36" height="18" rx="4" fill="rgba(238, 234, 226, 0.02)" stroke="#3498db" stroke-width="1.5" />
    <circle cx="137" cy="85" r="2.5" fill="none" stroke="#eeeae2" stroke-width="1" />
    <path d="M 145 82 H 159 M 145 87 H 154" fill="none" stroke="#3498db" stroke-width="1" stroke-linecap="round" />
  </g>
</svg>
