<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120">
  
  <!-- Camera/image frame -->
  <rect x="14" y="30" width="40" height="34" rx="3" stroke="#3498db" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mountain scene inside frame -->
  <polyline points="18,58 28,42 38,52 44,44 50,58" stroke="#3498db" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sun in image -->
  <circle cx="44" cy="38" r="4" fill="#eeeae2"/>
  <!-- Camera lens indicator -->
  <circle cx="34" cy="26" r="3" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <rect x="28" y="24" width="12" height="4" rx="1" stroke="#3498db" stroke-width="1" fill="none"/>
  <!-- Neural network nodes - layer 1 -->
  <circle cx="76" cy="36" r="3" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <circle cx="76" cy="52" r="3" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <circle cx="76" cy="68" r="3" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <!-- Neural network nodes - layer 2 -->
  <circle cx="100" cy="42" r="3" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <circle cx="100" cy="58" r="3" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <circle cx="100" cy="74" r="3" stroke="#3498db" stroke-width="1.5" fill="none"/>
  <!-- Neural network nodes - layer 3 -->
  <circle cx="122" cy="48" r="3" fill="#eeeae2"/>
  <circle cx="122" cy="64" r="3" fill="#eeeae2"/>
  <!-- Connections layer 1 to 2 -->
  <g stroke="#3498db" stroke-width="0.7" opacity="0.6">
    <line x1="79" y1="36" x2="97" y2="42"/><line x1="79" y1="36" x2="97" y2="58"/>
    <line x1="79" y1="52" x2="97" y2="42"/><line x1="79" y1="52" x2="97" y2="58"/>
    <line x1="79" y1="68" x2="97" y2="58"/><line x1="79" y1="68" x2="97" y2="74"/>
  </g>
  <!-- Connections layer 2 to 3 -->
  <g stroke="#3498db" stroke-width="0.7" opacity="0.6">
    <line x1="103" y1="42" x2="119" y2="48"/><line x1="103" y1="58" x2="119" y2="48"/>
    <line x1="103" y1="58" x2="119" y2="64"/><line x1="103" y1="74" x2="119" y2="64"/>
  </g>
  <!-- Input arrow -->
  <line x1="56" y1="47" x2="72" y2="47" stroke="#3498db" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round"/>
  <!-- Text lines output -->
  <line x1="136" y1="44" x2="166" y2="44" stroke="#eeeae2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="52" x2="160" y2="52" stroke="#eeeae2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="60" x2="164" y2="60" stroke="#eeeae2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="68" x2="152" y2="68" stroke="#eeeae2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Output arrow -->
  <line x1="126" y1="56" x2="133" y2="56" stroke="#3498db" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round"/>
</svg>
