<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120">
  
  <!-- Hockey rink outline -->
  <rect x="16" y="20" width="100" height="80" rx="20" stroke="#3498db" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center line -->
  <line x1="66" y1="20" x2="66" y2="100" stroke="#3498db" stroke-width="0.8" opacity="0.4"/>
  <!-- Center circle -->
  <circle cx="66" cy="60" r="10" stroke="#3498db" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="66" cy="60" r="2" fill="#eeeae2"/>
  <!-- Face-off circles -->
  <circle cx="40" cy="42" r="5" stroke="#3498db" stroke-width="0.7" fill="none" opacity="0.4"/>
  <circle cx="40" cy="78" r="5" stroke="#3498db" stroke-width="0.7" fill="none" opacity="0.4"/>
  <circle cx="92" cy="42" r="5" stroke="#3498db" stroke-width="0.7" fill="none" opacity="0.4"/>
  <circle cx="92" cy="78" r="5" stroke="#3498db" stroke-width="0.7" fill="none" opacity="0.4"/>
  <!-- Goal net left -->
  <rect x="18" y="50" width="6" height="20" rx="1" stroke="#eeeae2" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- Goal net right -->
  <rect x="108" y="50" width="6" height="20" rx="1" stroke="#eeeae2" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- Hockey stick -->
  <line x1="50" y1="54" x2="58" y2="70" stroke="#3498db" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="70" x2="64" y2="72" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <!-- Puck -->
  <ellipse cx="48" cy="52" rx="3" ry="1.5" fill="#eeeae2"/>
  <!-- Stats overlay - bar chart -->
  <rect x="130" y="62" width="8" height="28" rx="1" stroke="#3498db" stroke-width="1" fill="none"/>
  <rect x="142" y="46" width="8" height="44" rx="1" stroke="#3498db" stroke-width="1" fill="none"/>
  <rect x="154" y="54" width="8" height="36" rx="1" stroke="#3498db" stroke-width="1" fill="none"/>
  <!-- Bar fills -->
  <rect x="131" y="72" width="6" height="17" fill="#3498db" opacity="0.3"/>
  <rect x="143" y="56" width="6" height="33" fill="#3498db" opacity="0.3"/>
  <rect x="155" y="64" width="6" height="25" fill="#3498db" opacity="0.3"/>
  <!-- Stats label dots -->
  <circle cx="134" cy="38" r="2" fill="#eeeae2"/>
  <circle cx="146" cy="38" r="2" fill="#eeeae2"/>
  <circle cx="158" cy="38" r="2" fill="#eeeae2"/>
  <!-- Trend line over bars -->
  <polyline points="134,68 146,52 158,58" stroke="#eeeae2" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
